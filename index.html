<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Request</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Sarabun', sans-serif;
    margin:0;
    background:#f1f5f9;
}

.header {
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    padding:20px;
    font-size:20px;
    font-weight:600;
}

.container {
    padding:15px;
}

.card {
    background:white;
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.label {
    font-size:14px;
    margin-bottom:5px;
    color:#334155;
}

.input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    font-size:15px;
}

.checkbox-group {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.checkbox-card {
    padding:12px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    display:flex;
    align-items:center;
    gap:10px;
}

.button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    color:white;
    background:#2563eb;
}

.button:active {
    background:#1e40af;
}
</style>
</head>

<body>

<div class="header">
📄 IT Request Form
</div>

<div class="container">

<div class="card">
<div class="label">ชื่อ</div>
<input id="name_th" class="input">

<div class="label">บริษัท</div>
<input id="company" class="input">

<div class="label">ตำแหน่ง</div>
<input id="position" class="input">

<div class="label">เบอร์โทร</div>
<input id="phone" class="input">
</div>

<div class="card">
<div class="label">เลือกอุปกรณ์</div>

<div class="checkbox-group">
<label class="checkbox-card">
<input type="checkbox" id="pc"> PC
</label>

<label class="checkbox-card">
<input type="checkbox" id="nb"> Notebook
</label>
</div>
</div>

<button class="button" onclick="submitForm()">
ส่งคำขอ
</button>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxsdmTBiOyNF3-_uMUp1MIf8RuSWnW9wn1wqxlP-V9QkngIb3vsehIscVRxcaRmFzXY/exec";

function getItems(){
    let items=[];
    if(pc.checked) items.push("PC");
    if(nb.checked) items.push("Notebook");
    return items;
}

function getItems() {
    const items = [];
    const pc = document.getElementById("pc");
    const nb = document.getElementById("nb");

    if (pc && pc.checked) items.push("PC");
    if (nb && nb.checked) items.push("Notebook");

    return items;
}

async function submitForm() {
    const payload = {
        name_th: document.getElementById('name_th').value.trim(),
        company: document.getElementById('company').value.trim(),
        position: document.getElementById('position').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        req_date: document.getElementById('req_date')?.value?.trim() || '',
        items: getItems()
    };

    if (!payload.name_th) {
        alert("กรุณากรอกชื่อ");
        return;
    }

    try {
        const res = await fetch(API, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
                action: "create",
                payload
            })
        });

        const raw = await res.text();
        console.log("API raw response:", raw);

        const data = JSON.parse(raw);

        if (!data.ok) {
            throw new Error(data.message || "API error");
        }

        alert("✅ บันทึกสำเร็จ\nเลขเอกสาร: " + data.data.doc_no);
    } catch (error) {
        console.error("submitForm failed:", error);
        alert("❌ ส่งข้อมูลไม่สำเร็จ\n" + error.message);
    }
}
</script>

</body>
</html>
