<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
</head>
<body>
  <input id="search" placeholder="ค้นหา">
  <table border="1">
    <thead>
      <tr>
        <th>Doc</th>
        <th>Name</th>
        <th>Company</th>
        <th>Items</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>

  <script src="dashboard.js"></script>
</body>

<script>
const API="https://script.google.com/macros/s/AKfycbxsdmTBiOyNF3-_uMUp1MIf8RuSWnW9wn1wqxlP-V9QkngIb3vsehIscVRxcaRmFzXY/exec";
let allData = [];

async function loadData() {
  const res = await fetch(API + "?action=list");
  const data = await res.json();
  allData = data.data || [];
  render(allData);
}

function render(rows) {
  const tb = document.getElementById("tb");
  tb.innerHTML = "";

  rows.forEach(r => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.doc_no || ""}</td>
      <td>${r.name_th || ""}</td>
      <td>${r.company || ""}</td>
      <td>${r.items || ""}</td>
      <td>${r.doc_status || ""}</td>
      <td>
        <button class="approve-btn">อนุมัติ</button>
        <button class="reject-btn">ไม่อนุมัติ</button>
      </td>
    `;

    const approveBtn = tr.querySelector(".approve-btn");
    const rejectBtn = tr.querySelector(".reject-btn");

    approveBtn.addEventListener("click", () => updateStatus(r.doc_no, "อนุมัติ"));
    rejectBtn.addEventListener("click", () => updateStatus(r.doc_no, "ไม่อนุมัติ"));

    tb.appendChild(tr);
  });
}

async function updateStatus(docNo, status) {
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action: "update",
        doc_no: docNo,
        status
      })
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.message || "Update failed");

    await loadData();
  } catch (err) {
    console.error(err);
    alert("อัปเดตสถานะไม่สำเร็จ: " + err.message);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("search").addEventListener("input", e => {
    const keyword = e.target.value.toLowerCase();
    const filtered = allData.filter(r =>
      (r.doc_no || "").toLowerCase().includes(keyword) ||
      (r.name_th || "").toLowerCase().includes(keyword) ||
      (r.company || "").toLowerCase().includes(keyword)
    );
    render(filtered);
  });

  loadData();
});

  <script src="dashboard.js"></script>
</body>
</html>
